# Nightly (edge) build — tracks the latest commit on master.
#
# On every relevant push to master we:
#   1. run the test suite (reused test.yaml),
#   2. build per-arch images and push them to GHCR as
#      ghcr.io/78wesley/subtracker-nightly-{arch}:<version> (+ :latest),
#   3. stamp that <version> into subtracker-nightly/config.yaml and commit it
#      back, so Home Assistant detects an update and pulls the matching tag.
#
# <version> is "<YYYY.M.D>.<run_number>" — always increasing, so HA's version
# comparison orders builds correctly. The commit in step 3 is made with the
# default GITHUB_TOKEN, which does NOT re-trigger workflows; the path filter
# below also excludes that file as a second safeguard against a loop.
#
# One-time setup after the first run: make BOTH packages public at
# https://github.com/users/78wesley/packages →
#   subtracker-nightly-amd64, subtracker-nightly-aarch64
# (Package settings → Change visibility → Public) so the Supervisor can pull them.
name: Build nightly image

on:
  push:
    branches: [master]
    paths:
      - "app/**"
      - "main.py"
      - "pyproject.toml"
      - "uv.lock"
      - "Dockerfile"
      - "docker-entrypoint.sh"
      - ".github/workflows/nightly.yaml"
      - ".github/workflows/test.yaml"
  workflow_dispatch:

# Serialise nightly runs so the version-bump commits never race each other.
concurrency:
  group: nightly
  cancel-in-progress: false

jobs:
  test:
    uses: ./.github/workflows/test.yaml

  version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.ver.outputs.version }}
    steps:
      - name: Compute nightly version
        id: ver
        run: |
          VERSION="$(date -u +%Y.%-m.%-d).${{ github.run_number }}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Nightly version: $VERSION ($GITHUB_SHA)"

  build:
    needs: [test, version]
    runs-on: ubuntu-latest
    permissions:
      packages: write   # to push images to GHCR
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
          - arch: aarch64
            platform: linux/arm64
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.arch }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: ${{ matrix.platform }}
          push: true
          tags: |
            ghcr.io/78wesley/subtracker-nightly-${{ matrix.arch }}:${{ needs.version.outputs.version }}
            ghcr.io/78wesley/subtracker-nightly-${{ matrix.arch }}:latest
          cache-from: type=gha,scope=nightly-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=nightly-${{ matrix.arch }}

  bump-version:
    # Once both images are pushed, point the nightly add-on at the new tag.
    needs: [version, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write   # to commit the version bump back to master
    steps:
      - uses: actions/checkout@v4
        with:
          ref: master

      - name: Stamp nightly version into config.yaml and commit
        env:
          VERSION: ${{ needs.version.outputs.version }}
        run: |
          sed -i -E 's/^version:.*/version: "'"$VERSION"'"/' subtracker-nightly/config.yaml
          if git diff --quiet -- subtracker-nightly/config.yaml; then
            echo "No version change; skipping commit."
            exit 0
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add subtracker-nightly/config.yaml
          git commit -m "chore(nightly): release $VERSION [skip ci]"
          # Rebase-and-retry in case a commit landed on master during the build.
          for i in 1 2 3; do
            git pull --rebase origin master && git push origin HEAD:master && exit 0
            echo "Push attempt $i failed; retrying."
          done
          exit 1
