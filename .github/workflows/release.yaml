# Stable release build — runs ONLY for version tags (v*), never on a plain push.
#
# Release flow:
#   1. bump `version:` in subtracker/config.yaml, commit to master,
#   2. tag it:  git tag v0.2.0 && git push origin v0.2.0
#
# This workflow then runs the tests, verifies the tag matches the config version,
# builds per-arch images, pushes them to GHCR as
# ghcr.io/78wesley/subtracker-{arch}:<version> (+ :latest), and opens a GitHub
# Release. Home Assistant offers the update once it re-reads the bumped config.
#
# One-time setup (already done if the old workflow ran): make both
# subtracker-amd64 and subtracker-aarch64 packages public.
name: Build release image

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:   # manual rebuild from the current subtracker/config.yaml version

jobs:
  test:
    uses: ./.github/workflows/test.yaml

  version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.ver.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Read & validate version
        id: ver
        run: |
          VERSION=$(grep -E '^version:' subtracker/config.yaml | head -1 \
            | sed -E 's/^version:[[:space:]]*"?([^"]+)"?[[:space:]]*$/\1/')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Release version: $VERSION"
          # On a tag build, the tag (vX.Y.Z) must match subtracker/config.yaml.
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            TAG="${GITHUB_REF_NAME#v}"
            if [ "$TAG" != "$VERSION" ]; then
              echo "::error::Tag v$TAG does not match subtracker/config.yaml version $VERSION." \
                   "Bump config.yaml to match the tag before releasing."
              exit 1
            fi
          fi

  build:
    needs: [test, version]
    runs-on: ubuntu-latest
    permissions:
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
          - arch: aarch64
            platform: linux/arm64
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.arch }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: ${{ matrix.platform }}
          push: true
          tags: |
            ghcr.io/78wesley/subtracker-${{ matrix.arch }}:${{ needs.version.outputs.version }}
            ghcr.io/78wesley/subtracker-${{ matrix.arch }}:latest
          cache-from: type=gha,scope=${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=${{ matrix.arch }}

  release:
    # Publish a GitHub Release for tag builds only.
    needs: [version, build]
    if: github.ref_type == 'tag'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
